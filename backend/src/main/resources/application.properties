spring.application.name=concall-drift

# ── PostgreSQL (Neon) ─────────────────────────────────────────────────────────
# Set DB_URL, DB_USER, DB_PASS as env vars on Render (from your Neon connection string)
# Locally falls back to the defaults on the right of each colon
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/concall_drift}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Seed data ─────────────────────────────────────────────────────────────────
# Data is seeded via DataSeeder.java (JPA) — no SQL script needed
spring.sql.init.mode=never

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ── Server ────────────────────────────────────────────────────────────────────
# Railway sets PORT automatically; locally defaults to 8080
server.port=${PORT:8080}
server.servlet.context-path=/api

# ── Yahoo Finance ─────────────────────────────────────────────────────────────
yahoo.finance.base-url=https://query1.finance.yahoo.com/v8/finance/chart/

# ── Scheduler ─────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.concalldrift=INFO
logging.level.com.concalldrift.scheduler=INFO
