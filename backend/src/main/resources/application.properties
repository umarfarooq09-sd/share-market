spring.application.name=concall-drift

# ── MySQL ─────────────────────────────────────────────────────────────────────
# Railway injects MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
# Locally falls back to the defaults on the right of each colon
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:concall_drift}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:NewPassword123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Seed data ─────────────────────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ── Server ────────────────────────────────────────────────────────────────────
# Railway sets PORT automatically; locally defaults to 8080
server.port=${PORT:8080}
server.servlet.context-path=/api

# ── Yahoo Finance ─────────────────────────────────────────────────────────────
yahoo.finance.base-url=https://query1.finance.yahoo.com/v8/finance/chart/

# ── Scheduler ─────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=2

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.concalldrift=INFO
logging.level.com.concalldrift.scheduler=INFO
