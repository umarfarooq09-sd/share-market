services:
  - type: web
    name: concall-drift-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/auth/verify
    envVars:
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        value: "3306"
      - key: MYSQLDATABASE
        sync: false
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
